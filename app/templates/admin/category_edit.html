{% extends "base.html" %}
{% block title %}Modifier la catégorie{% endblock %}

{% block content %}
<div class="section-heading">
    <div>
        <div class="section-kicker">Catalog control</div>
        <h1>Modifier la catégorie</h1>
    </div>
    <a href="{{ url_for('admin.categories') }}" class="btn btn-secondary">Retour</a>
</div>

<div class="form-container" style="max-width: 700px;">
    <form method="POST" style="display: grid; gap: 1rem;">
        <input type="hidden" name="next" value="{{ url_for('admin.categories') }}">

        <div class="form-group">
            <label for="nom">Nom de la catégorie</label>
            <input type="text" id="nom" name="nom" value="{{ category.nom }}" required>
        </div>

        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="{{ url_for('admin.categories') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
